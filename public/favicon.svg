<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Soft rounded premium terracotta red background -->
  <rect width="512" height="512" rx="128" fill="#C8472B" />
  
  <!-- Minimalist Cloche (Dish Cover) and Plate in White -->
  <!-- Plate base -->
  <path d="M120 370 C120 360 130 350 145 350 H367 C382 350 392 360 392 370 C392 375 385 380 375 380 H137 C127 380 120 375 120 370 Z" fill="#FFFFFF" opacity="0.95"/>
  <!-- Cloche dome -->
