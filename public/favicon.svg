  <!-- Speed lines (representing "Quick" in QuickDine) -->
  <path d="M100 240 H130" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.8" />
  <path d="M90 280 H120" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.8" />
  <path d="M105 200 H125" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.8" />
</svg>